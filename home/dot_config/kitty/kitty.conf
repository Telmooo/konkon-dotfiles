# -- Fonts ---------------------------------------------------------------------
font_family      JetBrains Mono Nerd Font
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic
font_size        13.0

# -- Cursor --------------------------------------------------------------------
cursor                  #fdb8ff
cursor_text_color       #1a1520
cursor_shape            beam
cursor_beam_thickness   1.5
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# -- Scrollback ----------------------------------------------------------------
scrollback_lines 10000

# -- Mouse ---------------------------------------------------------------------
mouse_hide_wait 3.0
copy_on_select  no

# -- Window --------------------------------------------------------------------
window_padding_width        8
hide_window_decorations     yes
background_opacity          0.95
dynamic_background_opacity  no
confirm_os_window_close     0

# -- Colors --------------------------------------------------------------------
# Background / Foreground
background   #1a1520
foreground   #e8d8ec

# Selection
selection_background #3d2545
selection_foreground #ffffff

# Black
color0  #1a1520
color8  #4a3a50

# Red (coral)
color1  #ff6b6b
color9  #ff8787

# Green (mint)
color2  #7bed9f
color10 #98f5b3

# Yellow (honey)
color3  #ffa502
color11 #ffd166

# Blue (sky)
color4  #60a5fa
color12 #93c5fd

# Magenta (sakura pink)
color5  #fdb8ff
color13 #f0abfc

# Cyan (ice blue)
color6  #a0d8ef
color14 #bae6fd

# White (warm light)
color7  #d4c5d9
color15 #ffffff

# URL color
url_color #fdb8ff

# Tab bar
active_tab_foreground   #1a1520
active_tab_background   #fdb8ff
inactive_tab_foreground #d4c5d9
inactive_tab_background #211826
tab_bar_style           powerline
tab_powerline_style     slanted

# -- Bell ----------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# -- Keyboard shortcuts --------------------------------------------------------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0
